name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate public repo structure
        run: python3 scripts/validate_public.py
      - name: Check coverage and references
        run: python3 scripts/check_coverage.py
      - name: Validate direct-copy install references
        run: python3 scripts/validate_direct_install.py
      - name: Generate skill docs and check freshness
        run: |
          python3 scripts/generate_skill_docs.py
          git diff --exit-code docs/skills
      - name: Smoke source and direct-copy install
        run: python3 scripts/smoke_install.py
